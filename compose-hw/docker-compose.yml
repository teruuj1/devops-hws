version: '3.8'

services:
  # веб-сервер Nginx
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      my_net:
        ipv4_address: 10.10.10.2  # фиксация айпишника для наглядности

  # наше веб-приложение
  app:
    build: ./app  # из папки app
    volumes:
      - ./app/config:/app/config  # передаем конфиги
    depends_on:
      - db     # запуск после базы
    environment:
      - DB_HOST=db
      - DB_PASSWORD=secret
    networks:
      my_net:
        ipv4_address: 10.10.10.3

  # БД
  db:
    image: postgres:15
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=secret
    networks:
      my_net:
        ipv4_address: 10.10.10.4
        aliases:
          - new_db  # доступно по имени new_db
          - dev_db  # доступно по имени dev_db

# настройка сети
networks:
  my_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/28

# томы
volumes:
  db_data:
    driver: local
